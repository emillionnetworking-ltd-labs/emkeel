name: release

# Merge-triggered auto-publish: the merge to main IS the gate. Every push to main is checked
# against the tags — if pyproject's version has no `v<version>` tag yet, emkeel builds, publishes
# to PyPI, and creates the tag + GitHub Release. emkeel bumps its version per feature, so each
# merge is a new version = a new release. Publishing is no longer a manual step.
#
# Uses PyPI Trusted Publishing (OIDC) — NO token stored. Configure the trusted publisher on PyPI
# once: Project -> Publishing -> add this repo + workflow "release.yml".
#
# Idempotent: a push that does NOT bump the version finds the tag already present and skips cleanly
# (success, nothing published). The TAG is the source of truth (no network lookup). workflow_dispatch
# stays as a manual fallback. (No `release: published` trigger — the Release this workflow creates
# would re-trigger it; dropping it avoids junk runs.)
on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

# Serialize releases; never cancel a half-done publish.
concurrency:
  group: release
  cancel-in-progress: false

jobs:
  pypi-publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # create the tag + GitHub Release
      id-token: write  # required for OIDC Trusted Publishing
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # need the tags for the version guard

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      # Guard: publish only if this version was never released (its tag is absent).
      - name: Check whether this version is new
        id: guard
        run: |
          VERSION=$(grep -m1 '^version' pyproject.toml | sed -E 's/.*"([^"]+)".*/\1/')
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          if git rev-parse "v$VERSION" >/dev/null 2>&1; then
            echo "new=false" >> "$GITHUB_OUTPUT"
            echo "v$VERSION already released — skipping publish."
          else
            echo "new=true" >> "$GITHUB_OUTPUT"
            echo "v$VERSION is new — will build, publish, and tag."
          fi

      - name: Build wheel + sdist
        if: steps.guard.outputs.new == 'true'
        run: |
          python -m pip install --upgrade build
          python -m build

      - name: Publish to PyPI (Trusted Publishing)
        if: steps.guard.outputs.new == 'true'
        uses: pypa/gh-action-pypi-publish@release/v1

      - name: Tag + GitHub Release with auto notes
        if: steps.guard.outputs.new == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "v${{ steps.guard.outputs.version }}" \
            --generate-notes \
            --title "Emkeel ${{ steps.guard.outputs.version }}" \
            --target "$GITHUB_SHA"
