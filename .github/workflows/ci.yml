name: emkeel-ci

on:
  pull_request:
  push:
    branches: [main]

jobs:
  gates:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0          # full history so check_maint_scope can diff against the base
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install
        run: pip install -e ".[dev]"

      # Gate: el PR debe referenciar un ticket (trazabilidad ticket->codigo).
      # Solo aplica en pull_request (en push directo a main no hay PR title).
      - name: "Gate — ticket link"
        if: github.event_name == 'pull_request'
        env:
          EMKEEL_BRANCH: ${{ github.head_ref }}
          EMKEEL_PR_TITLE: ${{ github.event.pull_request.title }}
          # Secrets let the gate verify the ticket EXISTS in Jira (404 → hard fail). Absent → syntax-only warning.
          JIRA_BASE_URL: ${{ secrets.JIRA_BASE_URL }}
          JIRA_EMAIL: ${{ secrets.JIRA_EMAIL }}
          JIRA_TOKEN: ${{ secrets.JIRA_TOKEN }}
        run: python -m emkeel.gates.check_ticket_link

      - name: "Gate — ticket precedes work (ticket-first)"
        if: github.event_name == 'pull_request'
        env:
          EMKEEL_BRANCH: ${{ github.head_ref }}
          EMKEEL_PR_TITLE: ${{ github.event.pull_request.title }}
          EMKEEL_BASE_REF: ${{ github.base_ref }}
          # The gate compares Jira's `created` to the branch's first commit (ticket-first). Secrets absent → inconclusive warning.
          JIRA_BASE_URL: ${{ secrets.JIRA_BASE_URL }}
          JIRA_EMAIL: ${{ secrets.JIRA_EMAIL }}
          JIRA_TOKEN: ${{ secrets.JIRA_TOKEN }}
        run: python -m emkeel.gates.check_ticket_precedes_work

      - name: "Gate — ticket placed (decide the sprint before merge)"
        if: github.event_name == 'pull_request'
        env:
          EMKEEL_BRANCH: ${{ github.head_ref }}
          EMKEEL_PR_TITLE: ${{ github.event.pull_request.title }}
          # Blocks merge while a sprint-project ticket is still pending a placement decision. Secrets absent → inconclusive.
          JIRA_BASE_URL: ${{ secrets.JIRA_BASE_URL }}
          JIRA_EMAIL: ${{ secrets.JIRA_EMAIL }}
          JIRA_TOKEN: ${{ secrets.JIRA_TOKEN }}
        run: python -m emkeel.gates.check_ticket_placed

      # Gate: la via de mantenimiento emkeel-maint/ solo puede tocar ficheros de Emkeel.
      - name: "Gate — maintenance scope"
        if: github.event_name == 'pull_request'
        env:
          EMKEEL_BRANCH: ${{ github.head_ref }}
          EMKEEL_BASE_REF: ${{ github.base_ref }}
        run: python -m emkeel.gates.check_maint_scope

      # Gate: el carril dependabot/ (sin ticket) solo puede tocar ficheros de dependencias.
      - name: "Gate — dependabot scope"
        if: github.event_name == 'pull_request'
        env:
          EMKEEL_BRANCH: ${{ github.head_ref }}
          EMKEEL_BASE_REF: ${{ github.base_ref }}
        run: python -m emkeel.gates.check_dependabot_scope

      # Gate: un PR feature (rama feat/) debe traer su spec en emkeel-governance/specs/.
      - name: "Gate — plan present (features)"
        if: github.event_name == 'pull_request'
        env:
          EMKEEL_BRANCH: ${{ github.head_ref }}
        run: python -m emkeel.gates.check_plan_present

      # Gate: un spec de feature debe declarar Acceptance Criteria.
      - name: "Gate — acceptance criteria (features)"
        if: github.event_name == 'pull_request'
        env:
          EMKEEL_BRANCH: ${{ github.head_ref }}
        run: python -m emkeel.gates.check_acceptance_criteria

      # Gate: un feature debe declarar su estrategia (dormant hasta que exista una).
      - name: "Gate — strategy link (features)"
        if: github.event_name == 'pull_request'
        env:
          EMKEEL_BRANCH: ${{ github.head_ref }}
        run: python -m emkeel.gates.check_strategy_link

      # Gate: toda estrategia debe estar grounded (cada opción con fuente). Dormant si no hay.
      - name: "Gate — strategy quality"
        if: github.event_name == 'pull_request'
        run: python -m emkeel.gates.check_strategy_quality

      # Gate: el norte gobernado (strategy/*.md) solo se cambia en una rama strategy/<TICKET>. N/A si el PR no lo toca.
      - name: "Gate — strategy change (north star is lane-gated)"
        if: github.event_name == 'pull_request'
        env:
          EMKEEL_BRANCH: ${{ github.head_ref }}
          EMKEEL_BASE_REF: ${{ github.base_ref }}
        run: python -m emkeel.gates.check_strategy_change

      # Gate: un cambio de strategy/<topic>.md exige su <topic>.process.json (pasos no salteables: >=checked + provenance).
      - name: "Gate — strategy process (non-skippable steps)"
        if: github.event_name == 'pull_request'
        env:
          EMKEEL_BASE_REF: ${{ github.base_ref }}
        run: python -m emkeel.gates.check_strategy_process

      # Gate: un cambio a una superficie CRÍTICA (creds/aislación/distribución/contrato/gates) exige un test de integración.
      - name: "Gate — critical change needs an integration test"
        if: github.event_name == 'pull_request'
        env:
          EMKEEL_BASE_REF: ${{ github.base_ref }}
        run: python -m emkeel.gates.check_critical_integration

      # Gate: los docs de gobernanza usan campos en inglés canónico + supersesión de ADR bidireccional (ADR-0008).
      - name: "Gate — governance-doc conventions (canonical fields + bidirectional supersession)"
        if: github.event_name == 'pull_request'
        run: python -m emkeel.gates.check_doc_conventions

      # Gate: un feature que sirve a una estrategia debe ACUSAR su alineación (sección Alignment). Dormant si no hay estrategias.
      - name: "Gate — strategy alignment (feature acknowledges the north star)"
        if: github.event_name == 'pull_request'
        env:
          EMKEEL_BRANCH: ${{ github.head_ref }}
        run: python -m emkeel.gates.check_strategy_alignment

      # Gate: la suite completa de tests (memoria durable anti-regresión).
      - name: "Gate — tests"
        run: pytest -q
